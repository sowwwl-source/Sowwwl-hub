services:
  app:
    build: .
    container_name: sowwwl-app
    ports:
      - "3311:3311"
    environment:
      - PORT=3311
      - NODE_ENV=production
      - PLAYWRIGHT_EXECUTABLE_PATH=/usr/bin/chromium
      - CAMERA_STREAM_URL=http://192.168.1.22:5051/
      - CAPTURE_INTERVAL_MS=1000
      - DOMAIN_OFFSET_MS=11
      - FOCUS_INTERVAL_MS=8000
    restart: unless-stopped
    init: true
    ipc: host
    networks:
      - sowwwl-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3311/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:latest
    container_name: sowwwl-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-sowwwl.org}
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - sowwwl-network

networks:
  sowwwl-network:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
